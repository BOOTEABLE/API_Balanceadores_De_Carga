events {
    worker_connections 4096; 
}

http {
    upstream books_api { 
        least_conn; 
        
        # Agregamos la tolerancia a fallos a cada réplica
        server books_service_instancia1:5000 max_fails=3 fail_timeout=20s;
        server books_service_instancia2:5000 max_fails=3 fail_timeout=20s;
        server books_service_instancia3:5000 max_fails=3 fail_timeout=20s;
    } 
    
    upstream users_api { server users_service:5000; }
    upstream orders_api { server orders_service:5000; }

    server {
        listen 80;

        location /api/books/ {
            proxy_pass http://books_api;
            add_header X-Backend-Server $upstream_addr; 
        }

        location /api/users/ {
            proxy_pass http://users_api;
        }

        location /api/orders/ {
            proxy_pass http://orders_api;
        }
    }
}